id: shrestha-fu-2021-deep-generative-nmf
title: "Deep Generative Model Learning for Blind Spectrum Cartography with NMF-Based Radio Map Disaggregation"
authors:
  - Subash Shrestha
  - Xiao Fu
  - Min-Fong Hong
year: 2021
venue: "IEEE International Conference on Acoustics, Speech, and Signal Processing"
abstract: >
  Introduces blind spectrum cartography where neither emitter locations nor the number
  of active transmitters are known a priori. Non-negative matrix factorization is used
  to disaggregate the aggregate received PSD tensor into per-emitter radio maps, which
  are then individually completed by generative deep neural models trained on synthetic
  emitter map distributions. The approach handles the full blind SC problem end-to-end
  and is validated on both simulated and indoor measurement datasets.
tldr: >
  Blind spectrum cartography combining NMF-based emitter disaggregation with learned
  deep generative models, requiring no prior knowledge of transmitter count or locations.
