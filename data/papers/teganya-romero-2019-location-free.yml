id: teganya-romero-2019-location-free
title: "Location-Free Spectrum Cartography"
authors:
  - Yves Teganya
  - Daniel Romero
  - Luis Miguel Lopez Ramos
  - Baltasar Beferull-Lozano
year: 2018
venue: "IEEE Transactions on Signal Processing"
abstract: >
  Introduces spectrum cartography that does not require accurate sensor location
  estimates, addressing a key limitation of prior art in multipath-rich indoor
  and dense urban scenarios. Estimation relies on features derived from positioning
  pilot signals rather than explicit location estimates, yielding learning algorithms
  with markedly improved performance. Simulation studies in indoor scenarios confirm
  the advantage over localization-based approaches.
tldr: >
  Location-free paradigm for spectrum cartography using pilot-signal features
  instead of sensor position estimates, crucial for indoor/urban multipath environments.
