id: '2605.23838'
title: Quantum critical collapse of a pinned vortex glass
authors:
  - David Perconte
  - Thibault Charpentier
  - Nikolaos Koutsopoulos
  - Kalpajit Roy
  - Nadjib Benchabane
  - Xiaoli Peng
