abstract: >
  This paper proposes an AIGC-driven framework for UAV communication that combines data augmentation,
  channel prediction, and trajectory optimization. A Wasserstein GAN generates high-quality synthetic
  channel data to address data-collection bottlenecks, which trains a knowledge-driven CKM achieving
  superior channel gain prediction. The enhanced CKM then guides a reinforcement learning algorithm
  to generate optimal UAV trajectories, reducing training loss by 30.23% and flight time from 81 s
  to 37 s versus traditional methods.
tldr: "Uses WGAN-augmented data to train a CKM, then guides reinforcement learning for UAV trajectory optimization, cutting flight time by 54%."
