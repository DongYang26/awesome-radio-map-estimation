id: "2211.10527"
title: "PMNet: Robust Pathloss Map Prediction via Supervised Learning"
authors:
  - Ju-Hyung Lee
  - Omer Gokalp Serbetci
  - Dhruv Selvam
  - Andreas F. Molisch
year: 2022
venue: "IEEE GLOBECOM 2023"
abstract: >
  PMNet proposes a supervised learning approach for pathloss map prediction that
  trains a neural network on a limited amount of ray-tracing or channel measurement
  data together with map data, then predicts pathloss over locations with no ray-tracing
  data. The proposed architecture, empowered by state-of-the-art computer vision
  techniques, outperforms prior architectures including UNet and RadioUNet in terms
  of accuracy while showing strong generalization capability. PMNet trained on a
  four-fold smaller dataset surpasses baselines trained on four-fold more data.
tldr: "CNN-based pathloss map predictor that outperforms RadioUNet in accuracy and data efficiency using modern computer-vision building blocks."
