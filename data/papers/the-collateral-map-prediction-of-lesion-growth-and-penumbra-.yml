id: the-collateral-map-prediction-of-lesion-growth-and-penumbra-
title: 'The collateral map: prediction of lesion growth and penumbra after acute anterior circulation ischemic stroke'
authors:
  - Jin-Seok Yi
  - Hee Jong Ki
  - Yoo Sung Jeon
  - Jeong-Jin Park
