abstract: >
  Designs a map-based deep neural network using DeepViT (deep vision transformer) for
  received signal strength prediction from satellite maps around base stations. A split
  learning framework splits the DNN between server and user sides to avoid raw data sharing.
  Evaluated on eight real-world datasets with 307,500 samples from an Australian telecom
  operator, the model significantly outperforms 3GPP Urban Macro and LSTM methods in
  centralised scenarios while reducing communication overhead versus federated learning.
tldr: "DeepViT map-based RSS predictor with split learning avoids raw data sharing and outperforms 3GPP/LSTM baselines on real operator data."
