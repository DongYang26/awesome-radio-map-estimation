dimensionality: 3D
supervision: supervised
abstract: >
  Introduces a runtime-efficient RF map prediction method based on UNet CNNs trained on a
  large-scale 3D maps dataset. Line-of-sight maps are computed and fed as additional input
  channels to the UNet. A Kullback-Leibler divergence loss minimises both error mean and
  variance. The method achieves an average normalised RMSE of 0.045 with 14 ms runtime
  in the ICASSP 2023 First Pathloss Radio Map Prediction Challenge.
tldr: "Runtime-efficient UNet pathloss predictor with LOS input and KL-divergence loss, 14 ms per map at ICASSP 2023 challenge."
