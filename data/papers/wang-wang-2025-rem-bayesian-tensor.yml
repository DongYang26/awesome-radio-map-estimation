id: wang-wang-2025-rem-bayesian-tensor
title: "Radio Environment Map Reconstruction via Tensor Completion: Bayesian and Semantic Approaches"
authors:
  - Xuegang Wang
  - Fanggang Wang
  - Boxiang He
year: 2025
venue: "IEEE Transactions on Vehicular Technology"
abstract: >
  Models the multi-domain REM (temporal, spectral, spatial) as a tensor and proposes
  two complementary completion approaches for recovering maps from incomplete and noisy
  observations. The Bayesian approach uses Tucker decomposition within a hierarchical
  variational Bayesian framework. The semantic approach applies Vision Transformer
  segmentation to identify per-emitter dominant regions before tensor completion.
  Semantic approach outperforms Bayesian in sparse emitter scenarios; Bayesian wins
  in dense emitter settings.
tldr: >
  Dual-approach REM tensor completion: hierarchical variational Bayes (Tucker) and
  ViT-semantic segmentation, each excelling at different emitter densities.
