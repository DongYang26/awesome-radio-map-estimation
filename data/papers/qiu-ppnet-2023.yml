abstract: >
  Presents PPNet, a deep convolutional encoder-decoder based on SegNet that transforms
  outdoor propagation environment information into a pathloss heatmap. The model is
  trained on synthetic data generated by a high-performance ray tracing simulator and
  evaluated in the ICASSP 2023 First Pathloss Radio Map Prediction Challenge. Results
  demonstrate good generalisation to unseen outdoor environments.
tldr: "PPNet SegNet-based encoder-decoder converts environment maps to outdoor pathloss heatmaps using ray-tracing training data."
