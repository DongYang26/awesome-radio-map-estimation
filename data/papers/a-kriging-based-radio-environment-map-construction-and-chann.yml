id: a-kriging-based-radio-environment-map-construction-and-chann
title: A Kriging-Based Radio Environment Map Construction and Channel Estimation System in Threatening Environments
authors:
  - Ying Gao
  - T. Fujii
year: 2023
venue: IEEE Access
abstract: Radio environment map (REM) provides detailed information on the coverage of the primary terminals of wireless communication systems. The spatial estimation of the channel condition is directly related to the radio environment. However, the open characteristics of a system are always accompanied by life-threatening conditions. This study addresses this by proposing the Kriging-based trust nodes aided (KTNA) REM construction method with a channel estimation (KTNA+) system. The proposed method adds a small number of trust nodes to avoid malicious impacts and precisely estimate the channel conditions. The simulation results show that the proposed method succeeded in estimating the average path-loss and shadowing impacts under threatening environmental conditions.
