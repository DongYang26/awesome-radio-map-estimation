title: 6D Channel Knowledge Map Construction via Bidirectional Wireless Gaussian Splatting
authors:
  - Juncong Zhou
  - Chao Hu
  - Guanlin Wu
  - Zixiang Ren
  - Han Hu
  - Juyong Zhang
  - Rui Zhang
