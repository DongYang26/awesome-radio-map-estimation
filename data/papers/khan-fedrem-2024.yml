input_modality: sparse-measurements
environment: indoor
dimensionality: 2D
supervision: supervised
abstract: >
  This paper proposes a federated learning LSTM model (FedLSTM) for constructing
  radio environment maps without sharing client measurement data with a central
  server. Multiple clients train the model locally while preserving privacy and
  reducing communication overhead. Using real data from clients moving along
  indoor paths, FedLSTM achieves RMSE of 2.5 dBm and MAE of 1.9 dBm, only
  marginally higher than the centralized counterpart (2.4 dBm / 1.7 dBm), while
  offering strong privacy guarantees.
tldr: >
  Privacy-preserving federated LSTM for indoor REM construction that matches
  centralized accuracy while keeping raw measurements on-device.
