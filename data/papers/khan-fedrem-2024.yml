id: khan-fedrem-2024
title: 'Radio Environment Map Construction Based on Privacy-Centric Federated Learning'
authors:
  - Shafi Ullah Khan
  - Carla E. García
  - Taewoong Hwang
  - Insoo Koo
year: 2024
venue: IEEE Access
subfield: REM
method_family: learning-based
