input_modality: both
environment: indoor
dimensionality: 2D
supervision: semi-supervised
abstract: >
  Presents Sparse-Guided RadioUNet, a five-channel U-Net integrating physics-informed inputs
  (reflection, transmission, distance maps) and sparse ground-truth pathloss samples. A
  two-stage frequency transfer learning routine enables generalisation across propagation
  conditions. A spread loss term penalises spatial discontinuities. An edge-strata-boundary
  sampling algorithm places informative probes under tight budgets. The full pipeline runs in
  2.5 ms per building at MLSP 2025.
tldr: "Sparse-Guided RadioUNet merges physics-informed channels with sparse supervision and achieves 2.5 ms inference at MLSP 2025."
