id: kojima-sparse-radiounet-2025
title: "Sparse-Guided RadioUNet with Adaptive Sampling for the MLSP 2025 Sampling-Assisted Pathloss Radio Map Prediction Data Competition"
authors:
  - Ryoichi Kojima
  - Satoshi Ito
