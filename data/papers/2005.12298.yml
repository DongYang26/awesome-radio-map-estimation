id: '2005.12298'
title: 'High-resolution VLA low radio frequency observations of the Perseus cluster: radio lobes, mini-halo, and bent-jet radio galaxies'
authors:
  - M. Gendron-Marsolais
  - J. Hlavacek-Larrondo
  - R. Weeren
  - L. Rudnick
  - Tracy E. Clarke
  - Biny Sebastian
  - T. Mroczkowski
