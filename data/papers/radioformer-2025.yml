id: radioformer-2025
title: "RadioFormer: A Multiple-Granularity Radio Map Estimation Transformer with 1‱ Spatial Sampling"
authors:
  - Zheng Fang
  - Kangjun Liu
  - Ke Chen
  - Qingyu Liu
  - Jianguo Zhang
  - Lingyang Song
  - Yaowei Wang
year: 2025
venue: arXiv
abstract: >
  RadioFormer introduces a Transformer-based architecture for radio map estimation
  that operates across multiple spatial granularities, enabling accurate predictions
  from as little as 1 per mille (0.1%) spatial sampling of the target area.
  The multi-granularity design aggregates both local detail and global propagation
  context through hierarchical attention, significantly reducing the measurement
  burden while maintaining high reconstruction fidelity across diverse urban and
  suburban environments.
tldr: "Hierarchical Transformer achieves competitive radio map estimation from 0.1% spatial sampling by fusing multi-granularity attention over environment and measurement features."
