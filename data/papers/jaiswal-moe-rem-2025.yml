abstract: >
  This paper applies transfer learning to a mixture-of-experts (MoE) model for
  indoor radio map estimation. The MoE combines location-based and location-free
  experts via a learned gating network to exploit their complementary strengths.
  A data-driven similarity measure predicts the amount of data needed for
  transfer to a new environment. The MoE approach requires only 5–40% of
  training data to adapt to new environments while achieving similar MSE to
  full retraining, and outperforms individual experts and prior state-of-the-art
  methods in both office and café environments.
tldr: >
  Mixture-of-experts with transfer learning for indoor REM that adapts to new
  environments with only 5-40% of normal training data.
