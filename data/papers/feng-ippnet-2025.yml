abstract: >
  Proposes IPP-Net, a generalizable deep neural network for indoor pathloss radio map
  prediction based on UNet architecture trained on large-scale ray tracing simulation
  data combined with a modified 3GPP indoor hotspot model. Evaluated in the First Indoor
  Pathloss Radio Map Prediction Challenge at ICASSP 2025, IPP-Net achieves a weighted
  RMSE of 9.501 dB across three competition tasks, obtaining second overall ranking.
tldr: "IPP-Net UNet trained on ray-tracing plus 3GPP data achieves 2nd place in ICASSP 2025 Indoor Pathloss Challenge."
