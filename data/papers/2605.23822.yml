id: '2605.23822'
title: Coarse Structures on Homogeneous Spaces
authors:
  - Carlos Pérez Estrada
  - Christian Rosendal
year: 2026
abstract: Given a closed normal subgroup $H$ of a topological group $G$, we address the question of whether the left coarse structure on the quotient group $G/H$ equals the quotient of the left coarse structure on $G$. We provide a counterexample among Polish groups, namely, the mapping class group of the Loch Ness monster surface seen as a quotient of the mapping class group of the punctured Loch Ness monster surface, and establish both equivalent and sufficient conditions for when this holds in special settings. The latter are formulated in terms of liftings of bounded sets, existence of transversals and metrisability of the left coarse structure of $G$ restricted to $H$.
