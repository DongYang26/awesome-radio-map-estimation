abstract: >
  Proposes an MST++ vision transformer-based pathloss estimation model augmented with
  direct wave power as an auxiliary input for line-of-sight detection. Experiments on
  indoor and outdoor datasets show significantly reduced estimation errors compared to
  existing deep learning methods, demonstrating the utility of integrating physical
  wave-power priors into transformer-based architectures.
tldr: "MST++ vision transformer with direct-wave-power auxiliary input improves pathloss estimation across indoor and outdoor environments."
