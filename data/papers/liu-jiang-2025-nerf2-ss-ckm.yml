abstract: >
  Inspired by neural radio-frequency radiance fields (NeRF2), this paper proposes NeRF2-SS which
  uses scene structure as strong prior information in the neural network to predict the spatial
  spectrum for CKM construction. NeRF2-SS introduces a scene-structure-based sampling method
  concentrating samples near scatterer surfaces, and a lightweight architecture that distinctly
  processes near-surface and free-space samples. Simulation results show 85-90% reduction in
  inference latency versus NeRF2 with high-precision spatial spectrum prediction.
tldr: "NeRF2-SS fuses 3D scene geometry priors into a neural radiance field to accelerate CKM spatial-spectrum prediction by 85-90% over NeRF2."
