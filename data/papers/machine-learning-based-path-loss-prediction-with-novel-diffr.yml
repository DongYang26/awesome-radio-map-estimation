id: machine-learning-based-path-loss-prediction-with-novel-diffr
title: Machine Learning-Based Path Loss Prediction With Novel Diffraction and Morphology Features
authors:
  - Beom Kwon
  - Hyeongyong Lim
  - Jaedon Park
  - Eonsu Noh
year: 2025
venue: IEEE Antennas and Wireless Propagation Letters
abstract: 'Several machine learning (ML) algorithms have been applied to predict path loss values, and various features have been proposed as input features in ML models. This study proposed two new types of features: diffraction parameter and morphology ratio features. In addition, we conducted a field measurement campaign to collect actual path loss data in various propagation environments. We conducted ablation studies on our own path loss dataset to evaluate the effectiveness of the proposed features using various ML models. The results demonstrated that the prediction accuracy of each ML model improved when the proposed features were added to the input feature vector.'
