id: romero-kim-2015-semiparametric
title: "Stochastic Semiparametric Regression for Spectrum Cartography"
authors:
  - Daniel Romero
  - Seung-Jun Kim
  - Georgios B. Giannakis
year: 2015
venue: "IEEE International Workshop on Computational Advances in Multi-Sensor Adaptive Processing (CAMSAP)"
abstract: >
  Develops a stochastic semiparametric regression approach for online spectrum
  cartography that blends a parametric propagation model with a nonparametric
  RKHS correction term. The method processes sensor measurements sequentially,
  updating the map estimate with each new observation at low per-sample cost.
  The semiparametric structure provides robustness against model mismatch while
  retaining computational efficiency suitable for real-time deployment.
tldr: >
  Online semiparametric RKHS regression for spectrum cartography that blends
  a parametric propagation model with a nonparametric correction for real-time maps.
