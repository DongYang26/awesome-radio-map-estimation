id: '2203.11604'
title: Radio Environment Maps for Dynamic Frequency Selection in V2X Communications
authors:
  - Paweł Sroka
  - P. Kryszkiewicz
  - Adrian Kliks
year: 2020
venue: IEEE Vehicular Technology Conference
abstract: 'In this paper, we investigate the concept of database supported Vehicular Dynamic Spectrum Access (VDSA) for platooning. As various researchers show that the 5.9 GHz band, devoted for Intelligent Transportation Systems, may suffer from congestion of the channel, we propose to offload part of this traffic to white-spaces with the guidance of the active database system. In our work, we describe our measurement campaign which delivered data for population of the dedicated radio environment map. Once the map is created, it was used in three proposed algorithms for VDSA: an optimal and two pragmatic approaches.'
