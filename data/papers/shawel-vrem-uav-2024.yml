abstract: >
  This paper proposes volumetric REM (VREM) construction that captures 3D
  propagation losses in both areal and altitude dimensions for UAV-assisted
  networks. Two deep learning models are developed: a Vol2Vol approach using 3D
  generative adversarial networks, and a sliced VREM with altitude-aware
  spider-UNets. The Addis dataset comprising 54,000 samples from urban Addis
  Ababa with 15 altitude slices per sample is introduced. The Vol2Vol approach
  achieves a minimum L1 loss of 0.01, demonstrating statistically comparable
  volumetric radio maps.
tldr: >
  3D/volumetric REM construction for UAV networks using 3D-GANs and altitude-aware
  spider-UNets, with a new large-scale urban dataset from Addis Ababa.
