id: sallouha-remunet-2023
title: "REM-U-Net: Deep Learning Based Agile REM Prediction With Energy-Efficient Cell-Free Use Case"
authors:
  - Hazem Sallouha
  - Shamik Sarkar
  - Enes Krijestorac
  - D. Cabric
year: 2023
venue: "IEEE Open Journal of Signal Processing"
subfield: pathloss-prediction
method_family: learning-based
method_detail: [CNN]
task: [pathloss-prediction, coverage-prediction]
input_modality: environment-map
environment: outdoor
dimensionality: 3D
supervision: supervised
abstract: >
  Introduces a runtime-efficient REM prediction framework based on U-Nets trained on a
  large-scale 3D maps dataset, with data preprocessing steps to improve accuracy.
  The method achieves an average normalised RMSE of 0.045 at 14 ms runtime in the
  ICASSP 2023 challenge and is applied to a cell-free massive MIMO use case to determine
  which access points to switch on without measuring large-scale fading.
tldr: "U-Net REM predictor trained on 3D outdoor maps enables energy-efficient cell-free mMIMO AP scheduling without explicit LSF measurements."
