abstract: >
  This paper proposes a channel prediction scheme combining CKM with historical user CSI to
  enhance MIMO beamforming performance. A joint-orthogonal matching pursuit algorithm reconstructs
  user channels from limited pilots, while a multi-path component tracking algorithm extracts
  common and independent support sets from estimated channels and CKM. An adaptive low-complexity
  predictor then delivers future CSI, evaluated on multiple measured channel datasets.
tldr: "Fuses CKM-derived multipath priors with real-time pilots to predict future MIMO CSI for beamforming, validated on measured datasets."
