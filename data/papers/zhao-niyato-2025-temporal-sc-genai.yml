id: zhao-niyato-2025-temporal-sc-genai
title: "Temporal Spectrum Cartography in Low-Altitude Economy Networks: A Generative AI Framework With Multi-Agent Learning"
authors:
  - Changyuan Zhao
  - Ruichen Zhang
  - Jiacheng Wang
  - Dusit Niyato
  - Gang Sun
  - Hongyang Du
  - Zan Li
  - Abbas Jamalipour
  - Dong In Kim
year: 2025
venue: "IEEE Transactions on Mobile Computing"
abstract: >
  Introduces a two-stage generative AI framework for temporal spectrum cartography
  in low-altitude economy networks (LAENets) with UAV aerial devices. Stage one uses
  a Reconstructive Masked Autoencoder (RecMAE) with a dual-mask mechanism to accurately
  reconstruct spectrum maps from sparse temporally varying sensor data. Stage two
  applies Multi-agent Diffusion Policy (MADP) with diffusion-based reinforcement
  learning and temporal-attention encoding to optimize UAV sensor trajectories,
  minimizing cumulative reconstruction error across dynamic low-altitude environments.
tldr: >
  Two-stage GenAI framework for UAV temporal spectrum cartography: masked autoencoder
  reconstruction followed by diffusion-policy multi-agent trajectory optimization.
