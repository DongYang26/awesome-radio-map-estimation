abstract: >
  Introduces a ResNet-based model for outdoor pathloss prediction that generates Tx/Rx
  depth maps and a distance map from geographic data, together with a weighting map
  emphasising areas adjacent to the direct Tx-Rx path to capture reflection and diffraction.
  Evaluated on the ITU challenge 2024 and ICASSP 2023 datasets, the model outperforms
  PPNet, RPNet, and ViT by 1.2-3.0 dB while using 60% fewer FLOPs than benchmarks.
tldr: "ResNet pathloss predictor with depth maps and a direct-path weighting map beats PPNet/ViT by 1.2-3 dB at 60% fewer FLOPs."
