abstract: >
  This paper introduces CKMImageNet, a large-scale dataset providing both location-tagged
  numerical channel data and visual environment images to support AI-driven CKM construction.
  Built with commercial ray-tracing software, CKMImageNet captures electromagnetic wave
  propagation in diverse scenarios, revealing location-environment-channel relationships.
  It enables computer vision algorithms for CKM construction and supports both supervised
  and generative AI approaches for environment-aware 6G systems.
tldr: >
  CKMImageNet is a ray-tracing-based dataset pairing location-tagged channel knowledge
  with environmental images to enable computer-vision-driven CKM construction.
