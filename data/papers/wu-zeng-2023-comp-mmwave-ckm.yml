abstract: >
  This paper proposes an environment-aware CoMP beam alignment scheme for mmWave massive MIMO
  systems using channel angle maps (CAMs) derived from CKM. For the case with a priori UE location,
  wireless channels of all cooperating base stations can be reconstructed from CAM-inferred angle
  information with light training overhead. Without a priori UE location, CAM is first used in
  reverse to localize the UE from a subset of BSs, then forwards to infer remaining BS channels.
  Ray-tracing simulations demonstrate significant reduction in training overhead and improved
  effective rate over sequential per-BS beam sweeping.
tldr: "Uses channel angle maps from CKM to enable overhead-efficient CoMP mmWave beam alignment, with or without prior UE location information."
