dimensionality: 2D
supervision: supervised
abstract: >
  Presents LocUNet, a convolutional end-to-end trained neural network that estimates a
  user's position from the received signal strength of a small number of base stations
  using estimated pathloss radio maps. Two novel datasets for RSS and ToA methods in
  realistic urban environments are introduced and made publicly available. LocUNet
  outperforms state-of-the-art RSS and ToA localisation methods and is suitable for
  real-time applications.
tldr: "LocUNet uses CNN-estimated pathloss radio maps for real-time urban localisation, outperforming RSS/ToA baselines."
