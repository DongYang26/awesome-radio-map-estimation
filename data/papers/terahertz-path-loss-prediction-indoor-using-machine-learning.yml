id: terahertz-path-loss-prediction-indoor-using-machine-learning
title: TeraHertz Path-Loss Prediction Indoor using Machine Learning
authors:
  - Nagma Elburki
  - Affes Sofiéne
year: 2023
venue: 2023 IEEE International Conference on Advanced Systems and Emergent Technologies (IC_ASET)
abstract: 'In this paper, we investigate the robustness of Machine Learning (ML) based path loss prediction models within the context of THz band for indoor environment applications. This study highlights the limitations of both empirical and deterministic models and provide solution to improve the prediction''s accuracy. To do so, we investigate four different ML models which are: Gradient Boosting, Random Forest, Multivariate Polynomial and Deep Learning. The Random Forest and the Deep Learning models show a higher prediction accuracy compared to the other two techniques due to the inherently intensive learning of these models.'
