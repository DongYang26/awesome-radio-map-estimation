id: a-graph-neural-network-based-radio-map-construction-with-unc
title: A Graph Neural Network-Based Radio Map Construction With Uncertainty Prediction
authors:
  - Fatema Islam Tania
  - Seung-Jun Kim
year: 2025
venue: Asilomar Conference on Signals, Systems and Computers
abstract: A graph neural network (GNN)-based method is proposed for radio map construction and uncertainty prediction in urban environment. Based on sparse measurements, the received signal strength (RSS) values are interpolated over the entire area. A graph is constructed using the city map and base station (BS) locations to capture the spatial correlation pattern of the RSS. Our proposed graph construction rule allows faithful reconstruction of the sharp transitions in the RSS values across line-of-sight (LOS) and non-line-of-sight (NLOS) regions. The uncertainty levels associated with the RSS estimates are jointly predicted using the negative log-likelihood (NLL) training cost. Numerical tests show that the proposed algorithm achieves up to a 30% reduction in root mean square error (RMSE) compared with an existing GNN-based approach, and significantly outperforms a convolutional neural network (CNN)-based method with a comparable parameter count. Furthermore, the uncertainty estimates are readily interpretable, typically assigning higher uncertainty in areas with larger prediction errors or fewer available samples.
