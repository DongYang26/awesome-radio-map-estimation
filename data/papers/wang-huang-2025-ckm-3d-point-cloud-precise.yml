abstract: >
  This work highlights the necessity of leveraging 3D point clouds beyond conventional 2D visual
  representations for constructing high-precision CKMs. A novel framework integrates 3D point clouds
  into CKM construction through a hybrid model- and data-driven approach, with extensive case studies
  in real-world scenarios. A real-world dataset of measured channels paired with high-resolution 3D
  environmental data is released to support future research, demonstrating the potential of semantic
  3D environments for next-generation wireless communications.
tldr: "Demonstrates that 3D point cloud environments substantially improve CKM precision over 2D imagery, releasing a real-world 3D-channel paired dataset."
