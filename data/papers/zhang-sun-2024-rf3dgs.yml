abstract: >
  RF-3DGS proposes site-specific reconstruction of radio radiance fields from sparse
  samples using 3D Gaussian Splatting adapted for wireless propagation. The method
  requires only minutes for training and achieves millisecond inference for arbitrary
  receiver poses, providing fine-grained spatial CSI including channel gain, delay,
  AoA, and AoD. Real-world-calibrated experiments show significant improvement in
  reconstruction quality, training efficiency, and rendering speed over state-of-the-art.
tldr: >
  Adapts 3D Gaussian Splatting to wireless propagation for fast, high-fidelity
  site-specific radio radiance field reconstruction from sparse channel measurements.
