id: radio-environment-map-updating-procedure-based-on-hypothesis
title: Radio Environment Map Updating Procedure Based on Hypothesis Testing
authors:
  - Keita Katagiri
  - T. Fujii
year: 2019
venue: International Symposium on Dynamic Spectrum Access Networks
abstract: In this paper, we propose an updating method of a radio environment map (REM) using Welch’s t -test. The REM provides statistical radio information about primary users (PUs) to secondary users (SUs). By using REM, SUs can predict path loss and shadowing deviation in each location. However, the estimation accuracy of the radio environment is degraded if the surrounding environment changes since the initial REM is constructed. The database server should update the REM by detecting the change of the radio environment. Therefore, in this paper, we consider that the database server judges the change of the radio environment by using Welch’s t-test, which is one of the hypothesis testings. In the proposed method, the sensor nodes observe the received power in each location and report this information to the database server. The database server tests the difference of the average received power between the initial REM and the new observed datasets and decides the requirement of update of the REM. The simulation results show that the proposed method can detect the change of the radio environment and accurately predict the average received power than the updating method using oblivion factor.
