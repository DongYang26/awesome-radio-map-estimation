id: '2605.22475'
title: Rethinking the work of Langlands on Eisenstein series
authors:
  - Devadatta G. Hegde
year: 2026
abstract: Chapter $7$ of Langlands' monograph "On the functional equations satisfied by Eisenstein series" employs a sophisticated residue scheme to construct a portion of the discrete automorphic spectrum. We show, by examples, applications, and heuristics, that this construction is a straightforward regularization of cuspidal Eisenstein series at distinguished points, and that the regularization must track BOTH the zeros and the poles of these Eisenstein series.   Unlike the one-variable case, the zero set and pole set of a several-complex-variable meromorphic function can intersect at a point. The distinguished points supporting the discrete spectrum are typically of this kind. The zeros of cuspidal Eisenstein series - largely invisible in the rank-one case - begin to play a starring role in higher rank situations, on equal footing with the poles. We redo Langlands' famous $G_{2}$ calculation and show that once zeros are tracked, the calculation reduces to elementary algebra.   Drawing on rank-two examples, we introduce a program to re-think Langlands' construction from first principles, giving zeros and poles of cuspidal Eisenstein series equal standing from the very beginning. The program has the advantage of making the underlying phenomenon transparent, though carrying it out in full generality will require substantial further work.
