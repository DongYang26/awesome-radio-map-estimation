id: path-loss-prediction-based-on-machine-learning-techniques-su
title: 'PATH LOSS PREDICTION BASED ON MACHINE LEARNING TECHNIQUES: SUPPORT VECTOR MACHINE, ARTIFICIAL NEURAL NETWORK, AND MULTILINEAR REGRESSION MODEL'
authors:
  - J. Idogho
  - G. George
year: 2022
venue: 'Open Journal of Physical Science (ISSN: 2734-2123)'
abstract: 'The rapid progress in fairness, transparency, and reliability is inextricably linked to Nigeria''s rise as one of the continent''s leading telecom markets. Path loss has been one of the key issues in providing high-quality service in the telecommunications industry. Comparing route loss prediction systems with high accuracy and minimal complexity is so critical. In this article, the simulation of data was compared using three alternative models: Artificial Neural Network (ANN), Support Vector Machine (SVM), and a conventional Multilinear Regression (MLR) model. The performance of the various models is evaluated using measured data. The simulated outcome was then assessed using various performance efficiency metrics, including the Determination Coefficient (R2) and Root Mean Square Error (RMSE), Mean Square Error (MSE) and Root Square Error (R2) (MSE). For the modelling of all inputs, the anticipated results showed that the ANN model is marginally better than the SVM model. The results also demonstrated that the ANN and SVM models could model path loss prediction better than the MLR model. As a result, it is possible to recommend using ANN to estimate path loss.'
