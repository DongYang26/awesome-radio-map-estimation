id: analytical-performance-bounds-for-radio-map-estimation
title: Analytical Performance Bounds for Radio Map Estimation
authors:
  - Daniel Romero
  - Tien Ngoc Ha
  - Raju Shrestha
  - Massimo Franceschetti
year: 2023
venue: IEEE Vehicular Technology Conference
abstract: Radio map estimation (RME) aims at providing a radio frequency metric, such as the received power strength, at every location of a geographical region of interest by relying on measurements acquired at multiple positions. Although a large number of estimators have been proposed so far, their performance has been analyzed mostly on simulated data. The theoretical aspects of the RME problem as well as performance bounds remain an open problem. This paper takes a step towards filling this gap by means of a theoretical analysis of the RME problem in a free-space propagation environment. First, the complexity of the estimation problem is quantified by means of upper bounds on the spatial variability of radio maps. Second, error bounds are derived for zeroth-order and first-order interpolation estimators. The proximity coefficient, which depends proportionally on the transmitted power and inversely proportionally on the cube of the distance from the transmitters to the mapped region, is proposed to quantify the complexity of the RME problem. One of the main findings is that the error of the considered estimators is roughly proportional to this proximity coefficient. Simple numerical experiments verify the tightness of the obtained bounds.
