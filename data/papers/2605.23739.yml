year: 2026
abstract: Building on prior FAST targeted and blind SETI campaigns toward 33 exoplanet systems, we introduce a wavelet-integrated search pipeline for narrowband technosignature candidates in radio dynamic spectra. At its core, the pipeline uses a Multi-Scale Wavelet Net (MSWNet) to produce an interpretable multi-resolution representation, followed by a lightweight parameter estimator for endpoint localization. Rather than relying solely on hard-threshold drift searches, the pipeline reframes narrowband detection as wavelet-guided feature extraction followed by endpoint regression, morphology-aware filtering, raw-data S/N validation, and multi-beam anticoincidence veto. Applied to real FAST data, the pipeline recovers representative events from prior analyses and produces a compact set of veto-ready candidates for downstream inspection. The resulting workflow preserves interpretability, low regression complexity, and auditable threshold control, making it readily transferable to other radio surveys and large-scale technosignature searches.
