abstract: >
  Presents a transformer-based neural network for link-level path loss prediction from
  maps of variable dimensions containing building and foliage information. The transformer
  attends to propagation-relevant regions and scales efficiently to maps of different sizes.
  The model works with continuous transmitter and receiver coordinates without discretisation
  and generalises well to novel maps trained from sparse measurements.
tldr: "Transformer neural surrogate predicts link-level pathloss from variable-sized environment maps, attending to propagation-relevant regions."
