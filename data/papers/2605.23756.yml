year: 2026
abstract: 'The propagation of solar energetic particles (SEPs) through the heliosphere is primarily guided by the interplanetary magnetic field (IMF) which is embedded in the solar wind plasma. Large-scale IMF structures can drive transient variations in SEP intensities. Using Solar Orbiter observations, we identify a distinct class of SEP variations: SEP flux deflections (SFDs), which are commonly detected in SEP events and frequently recur multiple times within a single event. SFDs are characterized by a sudden change in SEP flux directions where the intensities drop in one direction and increase in another direction, without a significant net change in total flux magnitude. These deflections occur dispersionlessly across a broad energy range-from tens of keV to over 100 MeV-and exhibit steep intensity gradients. SFDs are typically associated with magnetic flux tubes with boundary features consistent with tangential discontinuities. We further show that the solar wind inside these structures exhibits distinct plasma properties, and that the SEP streaming direction within SFDs aligns closely to the flux-tube axis. These observations suggest that magnetic flux tubes are a prevalent structural element of the solar wind, and demonstrate that SEPs can serve as an effective diagnostic tool for probing the topology and dynamics of solar wind structures.'
