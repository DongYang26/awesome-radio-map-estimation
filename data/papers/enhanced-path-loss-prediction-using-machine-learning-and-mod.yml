id: enhanced-path-loss-prediction-using-machine-learning-and-mod
title: Enhanced Path Loss Prediction Using Machine Learning and Modified COST-Hata Model for High-Frequency Wireless Networks
authors:
  - Awal Halifa
  - K. Gyasi
  - E. A. Ampomah
  - Kwame Opuni-Boachie
  - Obour Agyekum
