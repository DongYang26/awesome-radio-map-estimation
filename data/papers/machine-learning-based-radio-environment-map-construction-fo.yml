abstract: Radio environment maps (REMs) can characterize a parameter of interest in a communication channel such as the reference signal received power (RSRP) at every point in a given geographical region. High-precision REMs have substantial potential for managing wireless resources and monitoring the spectrum. In this work, we explore various machine learning (ML) models, including an ensemble approach, to construct REMs by first estimating RSRP values in a long-term evolution (LTE) network. The simulation results indicate that the proposed ensemble approach exhibits great accuracy in RSRP estimation in LTE networks.
