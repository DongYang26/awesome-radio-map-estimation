abstract: >
  Proposes a machine learning framework for mmWave path loss prediction for UAV communications
  in 5G and beyond scenarios using geometrical features extracted from the propagation
  environment. The approach combines environment geometry descriptors with ML models to
  achieve accurate path loss estimates for air-to-ground links, addressing the unique
  propagation characteristics of mmWave UAV channels without relying on expensive ray
  tracing simulations.
tldr: "ML framework using geometrical environment features predicts mmWave path loss for UAV air-to-ground links in 5G and beyond."
