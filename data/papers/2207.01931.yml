abstract: >
  This paper investigates a CKM-assisted multi-UAV wireless network, focusing on CKM construction
  and utilization for multi-UAV placement optimization. A data-driven interpolation technique is
  exploited to construct CKMs from limited measurements. A derivative-free iterative algorithm
  is then proposed to optimize UAV placement to maximize weighted sum rate, using quadratic
  approximations subject to trust-region constraints.
tldr: "Proposes data-driven CKM interpolation and derivative-free optimization for joint multi-UAV placement in CKM-assisted networks."
