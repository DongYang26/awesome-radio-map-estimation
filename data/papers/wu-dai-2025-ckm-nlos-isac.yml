abstract: >
  This paper proposes a novel approach to enable environment-aware NLoS ISAC by leveraging
  CKM originally designed for wireless communications. A channel angle-delay map (CADM)
  serves dual purposes: communication channel priors are transformed into sensing channel
  priors, enabling NLoS target localization without building a separate sensing map.
  CRLB analysis validates significant performance improvements over classic geometry-based
  sensing methods in complex urban low-altitude airspace environments.
tldr: >
  Shows that a single CKM built for communications can be reused for NLoS sensing via
  angle-delay priors, enabling dual-purpose environment-aware ISAC with one map.
