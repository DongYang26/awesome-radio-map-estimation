year: 2020
venue: Astronomical Telescopes + Instrumentation
abstract: Measurement campaigns of radio frequency interferences (RFIs) represent a fundamental aspect to optimize data collected by radio astronomical observations. In order to monitor the state of unwanted man-made signals, every radio telescope needs to have a radio frequency map in the frequencies range of its receivers. The Sardinia Aperture Array Demonstrator (SAD) is an Italian aperture array demonstrator composed of prototypical Vivaldi antennas designed to work at frequencies below 500 MHz. The antennas are located at the Sardinia Radio Telescope (SRT) site and they are arranged with a versatile approach that is able to provide different array configurations. In this paper, we present the results of measurement campaigns conducted with the SAD antennas at the SRT observing site with the aim to monitor the evolution of RFI scenario from 2016 to date. The signal acquisition chain and the software tool used for RFI detection are, also, presented.
