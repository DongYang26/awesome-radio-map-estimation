id: alaya-feki-2008-interference-cartography
title: "Informed Spectrum Usage in Cognitive Radio Networks: Interference Cartography"
authors:
  - Afef Ben Hadj Alaya-Feki
  - Sana Ben Jemaa
  - Berna Sayrac
  - Patrick Houze
  - Eric Moulines
year: 2008
venue: "IEEE International Symposium on Personal, Indoor and Mobile Radio Communications"
abstract: >
  Introduces the concept of interference cartography for cognitive radio networks, where
  spatial interference maps are constructed from distributed sensor measurements to enable
  informed spectrum access decisions. Gaussian process regression (Kriging) is employed
  to interpolate interference levels across unobserved locations from sparse sensor reports.
  The resulting interference maps guide secondary users in selecting idle spectrum bands
  while protecting primary user transmissions.
tldr: >
  Early landmark proposing interference cartography via Kriging to enable geographically
  aware spectrum access in cognitive radio networks.
