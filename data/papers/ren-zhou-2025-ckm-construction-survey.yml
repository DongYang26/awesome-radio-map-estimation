abstract: >
  This article provides a comprehensive overview of recent advances in CKM construction,
  examining classical interpolation-based methods and their limitations. It explores
  image processing and generative AI techniques that leverage feature extraction using
  environmental knowledge, and presents emerging wireless radiance field (WRF) frameworks
  exploiting neural radiance fields and Gaussian splatting for high-fidelity CKM
  construction from sparse measurements. Future directions in real-time and cross-domain
  CKM construction are outlined.
tldr: >
  State-of-the-art survey on CKM construction covering interpolation, generative AI,
  and neural radiance field / Gaussian splatting approaches for 6G systems.
