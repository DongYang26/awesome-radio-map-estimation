id: u-net-for-indoor-pathloss-prediction-from-sparse-measurement
title: U-Net for Indoor Pathloss Prediction from Sparse Measurements with Physics-Based Features
authors:
  - K. Petrosyan
  - Rafayel Mkrtchyan
  - Hrant Khachatrian
  - Theofanis P. Raptis
year: 2025
venue: International Workshop on Machine Learning for Signal Processing
abstract: This work was conducted in the context of the MLSP 2025 Sampling-Assisted Pathloss Radio Map Prediction Data Competition. We propose a physics-based feature engineering approach combined with a U-Net architecture featuring ResNet-34 encoder and Atrous Spatial Pyramid Pooling (ASPP) module to reconstruct indoor pathloss maps from extremely sparse ground-truth samples. Our method transforms the three-channel input into eight physics-based channels incorporating free-space pathloss, cumulative transmittance losses, log-distance from the antenna, and a binary padding mask. Through a combination of geometric augmentations and multi-scale feature extraction, we achieve competitive performance across both uniform and strategic sampling scenarios. The model attains a weighted RMSE of 5.17 dB, while maintaining inference times of 65.2 ms per map including preprocessing—orders of magnitude faster than ray-tracing baselines.
