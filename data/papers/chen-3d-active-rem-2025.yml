abstract: >
  This paper proposes a 3D radio map estimation framework where aircraft actively
  select measurement positions to obtain high-quality estimates efficiently. A 3D
  convolutional autoencoder estimates the radio map and quantifies per-location
  uncertainty; an uncertainty-guided trajectory planning algorithm then directs
  the aircraft toward the most informative locations. Under a 5% sampling ratio,
  the framework achieves 2.61 dB estimation error, demonstrating that active
  trajectory selection substantially improves 3D reconstruction accuracy.
tldr: >
  Active-sampling 3D REM framework where a convolutional autoencoder quantifies
  uncertainty to guide aircraft measurement trajectories, achieving 2.61 dB error
  at 5% sampling.
