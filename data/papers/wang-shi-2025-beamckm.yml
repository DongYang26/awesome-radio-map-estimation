abstract: >
  This paper proposes BeamCKM, addressing the gap between scalar pathloss maps and multi-degree-of-freedom
  coherent beamforming for B5G/6G multi-antenna systems. The CKMTransUNet architecture combines a UNet
  backbone for multi-scale feature extraction with a Vision Transformer module for global dependencies.
  The M3ChanNet extension further leverages multi-modal learning and cross-attention to extract side
  information from environmental profiles and real-time beam observations, outperforming state-of-the-art
  interpolation and deep learning methods.
tldr: "BeamCKM extends scalar CKM to multi-antenna beam maps using a UNet+ViT architecture with multi-modal environmental and beam-observation fusion."
