id: '2605.23731'
title: Global estimates on the Brenier map
authors:
  - Andrea Bidoia
year: 2026
abstract: Caffarelli's contraction theorem and the analogous Laplacian result in [arXiv:2411.12109, arXiv:2501.11382] are two examples of how log-Hessian bounds on probability densities yield estimates on the derivative of the corresponding Brenier map with optimal dimensional dependence. The main goal of this paper is to extend such phenomenon to a broader class of convex estimates such as norms.
