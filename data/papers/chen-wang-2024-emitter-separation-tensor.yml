id: chen-wang-2024-emitter-separation-tensor
title: "Dynamic Spectrum Cartography via Emitter Separation-Based Tensor Completion"
authors:
  - Xiaonan Chen
  - Jun Wang
year: 2024
venue: "IEEE International Conference on Communications (ICC)"
abstract: >
  Proposes an emitter-separation strategy for dynamic spectrum cartography where
  time-varying RF maps are decomposed into per-emitter contributions before tensor
  completion. By separating the contributions of individual emitters prior to
  recovery, the method reduces the effective problem complexity and enables more
  accurate reconstruction of dynamic spatial-spectral-temporal radio maps from
  limited sensor measurements compared to joint recovery baselines.
tldr: >
  Dynamic spectrum cartography that first separates per-emitter contributions,
  then applies tensor completion to each, improving dynamic map recovery accuracy.
