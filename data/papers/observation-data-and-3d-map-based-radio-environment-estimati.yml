id: observation-data-and-3d-map-based-radio-environment-estimati
title: Observation Data and 3D Map-based Radio Environment Estimation for Drone Wireless Communications
authors:
  - S. Yamada
  - T. Fujii
  - Katsuya Suto
  - Koya Sato
year: 2023
venue: International Conference on Ubiquitous and Future Networks
abstract: Toward next-generation mobile communication systems such as beyond 5G and 6G, non-terrestrial networks (NTNs) have attracted much attention as they extend the coverage of wireless communication services. In NTNs, drones have multiple roles, such as delivery service and transportation, while providing communication services. Therefore, radio environment estimation in three-dimensional (3D) space is crucial for stable drone operations. However, the impact of the surrounding structures and terrain on the radio environment is not well investigated. In this paper, we propose a method to estimate the received power in the direction of altitude by fusing observed signal data and a 3D map that records the geometry of terrain and structures. The proposed method divides the estimation area into a line-of-sight (LOS) altitude and a non-line-of-sight (NLOS) altitude, the estimation values for each range, and then integrates them to obtain the overall estimation values. Through the simulation using the actual measurement dataset, it is demonstrated that the proposed method outperforms the conventional empirical propagation model, i.e., Hata model.
