abstract: >
  Describes the pathloss prediction system submitted to the ICASSP 2023 First Pathloss Radio Map
  Prediction Challenge. PMNet is a neural network specifically designed for pathloss prediction
  trained on the RadioMap3DSeer dataset. Data augmentation, fine-tuning, and architectural
  optimization are applied. The system achieves an RMSE of 0.02569 on the provided dataset and
  0.0383 on the challenge test set, placing 1st in the challenge.
tldr: "Challenge-winning PMNet CNN for outdoor pathloss map prediction, ranking 1st in ICASSP 2023."
