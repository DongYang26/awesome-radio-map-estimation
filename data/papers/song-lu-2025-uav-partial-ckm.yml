abstract: >
  This paper proposes a trajectory design strategy where UAV navigation and CKM completion are
  incorporated into a common framework for cellular-connected UAVs in urban environments with
  incomplete CKMs. The UAV measures radio information during flight and completes the CKM via
  Kriging interpolation. The resulting mixed-integer multi-objective problem is reformulated as
  shortest-path and traveling-salesman problem variants in graph theory, with two navigation
  strategies proposed and compared, achieving near-fully-known-CKM performance.
tldr: "Co-designs UAV navigation and incremental Kriging-based CKM completion as shortest-path and TSP variants, approaching full-CKM performance in urban settings."
