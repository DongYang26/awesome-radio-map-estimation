abstract: >
  NeWRF is a deep learning framework for wireless channel prediction based on Neural
  Radiance Fields (NeRF). Trained on sparse channel measurements, NeWRF predicts
  wireless channels accurately at any unvisited location in a site by integrating
  wireless propagation properties (multipath, diffraction, shadowing) into the NeRF
  framework. Extensive evaluations show accurate channel prediction at significantly
  lower measurement density than prior state-of-the-art methods.
tldr: >
  NeWRF adapts Neural Radiance Fields to wireless propagation, enabling site-specific
  channel prediction from sparse measurements for cost-effective site surveys.
