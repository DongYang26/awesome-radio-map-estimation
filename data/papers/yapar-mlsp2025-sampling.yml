abstract: >
  Describes the MLSP 2025 Sampling-Assisted Pathloss Radio Map Prediction Data Competition,
  targeting the less-explored case of combining sparse ground-truth pathloss samples with
  physical propagation environment information for indoor pathloss map estimation. The paper
  outlines the problem formulation, datasets, competition tasks, evaluation methodology, and
  provides an overview of submitted methods and results.
tldr: "MLSP 2025 challenge overview for sampling-assisted indoor pathloss prediction that combines sparse measurements with environment maps."
