abstract: >
  Proposes a machine learning-assisted mmWave channel modeling framework combining
  statistical inter-cluster models with a hybrid physics-based and data-driven approach
  for through-vegetation scattering at 28 GHz. Dedicated directional measurements and
  ray-tracing simulations are used in an identical vegetated street canyon. The hybrid
  model, which adds environment features as ANN inputs, achieves higher prediction accuracy
  and greater generalisation than physical-statistical models for vegetation attenuation,
  delay spread, and angular spread.
tldr: "Hybrid physics+ANN model predicts 28 GHz mmWave channel properties in vegetated outdoor environments better than statistical models alone."
