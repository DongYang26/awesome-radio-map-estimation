abstract: >
  This article surveys the application of generative AI for radio map estimation
  in complex urban wireless networks, tracing the evolution from point-level to
  cell-level predictions. A three-step deployment framework is proposed covering
  scene analysis, adaptation to new environments, and efficient network
  establishment. The article highlights how deep generative models combined with
  traditional wireless communication knowledge improve base station placement and
  network design for 5G-Advanced and 6G networks.
tldr: >
  Survey and framework showing how generative AI evolves REM from point-level
  to cell-level prediction for 5G-Advanced/6G network planning.
