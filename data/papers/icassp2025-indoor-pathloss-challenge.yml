year: 2025
venue: "IEEE International Conference on Acoustics, Speech, and Signal Processing (ICASSP)"
abstract: >
  This paper describes the ICASSP 2025 First Indoor Pathloss Radio Map Prediction
  Challenge, addressing the less-explored case of directional radio signal emissions
  in indoor propagation environments. The challenge provides datasets, task definitions,
  and evaluation methodology for indoor pathloss map prediction, and presents results
  and a summary of the submitted deep learning methods.
tldr: "First standardized benchmark for indoor directional pathloss map prediction, extending the outdoor ICASSP 2023 challenge to indoor environments."
