id: "icassp2025-indoor-pathloss-challenge"
title: "The First Indoor Pathloss Radio Map Prediction Challenge"
authors:
  - Stefanos Bakirtzis
  - Çagkan Yapar
  - Kehai Qiu
  - Ian J. Wassell
