id: '2605.23741'
title: Hydrodynamic model of nonthermal emission from the Fermi bubbles
authors:
  - V. A. Dogiel
  - D. O. Chernyshov
  - T. S. Fatekhov
  - A. M. Kiselev
  - C. M. Ko
year: 2026
abstract: We suggest a model of Fermi Bubbles (FBs) in the Galactic halo of the altitude about 7-8 kpc, which is seen in non-thermal microwave and gamma-ray ranges. It was assumed that this emission is generated by relativistic electrons of cosmic rays whose origin is still under debate. It has been assumed that the FB shell is generated in the halo by the release of energy, generated by the routine capture of stars at the central black hole of the Galactic Centre (GC). In this case cosmic ray electrons (CR) in the shells of the FBs of sufficiently high energies are generated by the standard shock acceleration. However, one of the problems of this model is that the Mach number of the FB shock is not high enough to generate the observed non-thermal radiation from the halo.   We propose an alternative model of stochastic CR acceleration by Rayleigh-Taylor (RT) instabilities in the shell of the FB at the late stages of the evolution of the shell in the halo. Unlike the shock model of CR acceleration, the RT model of in-situ acceleration in the FBs does not require strong shock fronts. In our model, we derived the spectrum of RT instabilities and estimate the spectra of kinetic equations for MHD-fluctuations needed for acceleration of CRs. We assessed the time of CR electron acceleration up to TeV energies that needed to interpret the observed data of gamma-ray and microwave emission from the envelope of FBs.
