id: '2605.23896'
title: A Stochastic Approach for Determining the Quark Confinement Potential of Charmonia
authors:
  - Ahmet Bingul
  - Altug Ozpineci
year: 2026
abstract: In this study, a non-relativistic potential model is used to calculate the mass spectrum and decay properties of low lying charmonium states. A stochastic framework is proposed to extract the possible analytical form of the confinement part of the interaction potential between quarks. Based on this approach, it is found that the confinement function deviates slightly from a linear form at large distances. The results obtained are compared with other theoretical predictions and current PDG values.
