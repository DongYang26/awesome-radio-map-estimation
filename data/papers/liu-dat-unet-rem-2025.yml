abstract: >
  DAT-Unet is a deformable attention transformer framework for radio map
  estimation under extreme sparsity. Deformable attention dynamically adjusts
  receptive fields to capture intricate spatial correlations and adapt to complex
  channel variations. Geometry-aware modeling integrates spatial priors, and
  multi-scale contextual fusion enhances feature representation across diverse
  propagation patterns. DAT-Unet achieves state-of-the-art performance on public
  datasets even at spatial sampling rates orders of magnitude below existing
  methods. Code is publicly available.
tldr: >
  DAT-Unet uses deformable attention in a U-Net to handle extremely sparse REM
  measurements, dynamically adapting receptive fields for complex propagation.
