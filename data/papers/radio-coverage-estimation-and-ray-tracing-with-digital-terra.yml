id: radio-coverage-estimation-and-ray-tracing-with-digital-terra
title: Radio Coverage Estimation and Ray Tracing with Digital Terrain Models in the Matlab Environment
authors:
  - G. Fokin
  - V. Starikov
  - Vladimir Sevidov
year: 2025
venue: 2025 Wave Electronics and its Application in Information and Telecommunication Systems (WECONF)
abstract: The article discusses the tools of the Matlab environment for planning radio coverage and ray tracing in fifth-generation mobile networks. In the process of modeling, calculations were made with omnidirectional and directional antennas of base stations. Taking into account weather factors, as well as the use of a three-dimensional digital map of the terrain, we can describe the complex conditions of signal propagation in an urban environment. Thanks to the built-in visualization tools, the process of express analysis of the qualitative parameters of the network is significantly simplified. Simulation results revealed, that Matlab ray tracing is an effective tool for modeling radio wave propagation in 5G networks and allows a detailed analysis of the impact of environmental features on communication quality, which is critical in dense urban areas.
