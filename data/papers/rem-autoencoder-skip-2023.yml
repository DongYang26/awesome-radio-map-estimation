id: rem-autoencoder-skip-2023
title: "Radio Map Estimation with Deep Dual Path Autoencoders and Skip Connection Learning"
authors:
  - W. Locke
  - Nikita Lokhmachev
  - Yan Huang
  - Xinrong Li
year: 2023
venue: "IEEE International Symposium on Personal, Indoor and Mobile Radio Communications (PIMRC)"
abstract: >
  This paper introduces a dual-path autoencoder architecture with skip connections
  for radio map estimation from sparse measurements. One encoder path processes
  the sparse measurement image while a second path encodes environmental context;
  skip connections fuse multi-scale features to reconstruct the complete radio
  map. The design prevents the over-smoothing common in single-path autoencoders
  and achieves improved RMSE on standard indoor and outdoor benchmarks.
tldr: "Dual-path autoencoder with skip connections fuses sparse measurements and environment context for sharper radio map reconstruction."
