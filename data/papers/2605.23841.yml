abstract: cloelike is a Python package providing modular, composable Gaussian likelihood classes for the main cosmological large-scale structure observables targeted by the ESA Euclid space mission. It is a core component of the CLOE (Cosmology Likelihood for Observables in Euclid) ecosystem and interfaces directly with cloelib for theoretical predictions and euclidlib for reading official Euclid data products. The package implements Gaussian likelihoods covering harmonic angular power spectra and real-space two-point correlation functions for weak lensing (WL), photometric galaxy clustering (GCph), and Galaxy-Galaxy Lensing (GGL) in all joint probe combinations (3x2pt, 2x2pt), as well as spectroscopic full-shape power spectrum multipoles, and baryonic Acoustic oscillations (BAO). cloelike is actively used in internal Euclid Consortium analyses and is openly released to support community validation and reproducibility.
