id: obtaining-of-carbon-nanowalls-in-the-plasma-of-radio-frequen
title: Obtaining of carbon nanowalls in the plasma of radio-frequency discharge
authors:
  - D. Batryshev
  - Y. Yerlanuly
  - B. Alpysbaeva
  - R. Nemkaeva
  - T. Ramazanov
  - M. Gabdullin
year: 2020
abstract: Abstract In this work a synthesis of carbon nanowalls (CNWs) in the plasma of argon and methane gases of capacitively coupled radio-frequency (CCRF) discharge is considered. The carbon nanowalls were synthesized by plasma enhanced chemical vapor deposition method at relatively lower values of discharge power and gas flow rate for low-cost CNWs production. The growth process of carbon nanowalls was studied at different synthesis parameters. The morphology and structure quality of obtained samples were investigated by Raman spectroscopy, scanning electron and atomic force microscopies. It was found, that at a lower value of RF power the formation of CNWs goes better with increasing methane flow rate and further increasing RF power leads to agglomeration of nanowalls and formation of nanoclusters, which then transfer into multilayered graphene. Thus, on the basis of obtained results, a process map with different zones of deposited carbon nanostructures is developed.
