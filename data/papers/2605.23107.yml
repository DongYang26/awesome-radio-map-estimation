year: 2026
abstract: The blazar Mrk 421 exhibits rapid variability over a wide range of timescales. Spectral differences have been observed during the different emission states of Mrk 421. During the high emission states, tests to constraint the Hubble constant and the photon intensity of Extragalactic Background Light (EBL) can be performed. The HAWC observatory provides an exceptionally long term monitoring of the source at TeV energies. We selected periods of high emission state and low emission state in data with total observation time of 2460 transits from the HAWC observatory using the All-sky Root around in an Unbiased way methodology.   We report on evidence of a cutoff in the spectrum of Mrk 421 during high emission states. An Exponential Cutoff Power Law is preferred over a Simple Power Law at a $3.8\,σ$ level. In the Exponential Cutoff Power Law, the cutoff is found at $13\pm3~\text{TeV}$. Using this result, we provide upper limits on the specific intensity of EBL photons. Moreover, the value of the energy cutoff found in our analysis is different from the cutoff expected by the interaction of gamma-rays with EBL photons. This result indicates that the cutoff is intrinsic to the source.
