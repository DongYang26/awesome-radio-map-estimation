id: kriging-rem-cognitive-2018
title: "Constructing Accurate Radio Environment Maps with Kriging Interpolation in Cognitive Radio Networks"
authors:
  - Danlei Mao
  - Wei Shao
  - Zuping Qian
  - Hong Xue
  - Xin Lu
  - Hongsheng Wu
year: 2018
venue: "Cross Strait Quad-Regional Radio Science and Wireless Technology Conference"
abstract: >
  This paper evaluates Kriging interpolation as a spatial estimation method for
  constructing radio environment maps in cognitive radio networks. The study
  compares ordinary, simple, and universal Kriging variants against IDW and
  nearest-neighbour baselines under varying measurement densities. Results
  demonstrate that Kriging consistently outperforms other classical interpolation
  methods in REM accuracy, particularly in environments with structured spatial
  correlation in the signal field.
tldr: "Systematic comparison of Kriging variants for REM construction in cognitive radio, establishing Kriging as the classical interpolation benchmark."
