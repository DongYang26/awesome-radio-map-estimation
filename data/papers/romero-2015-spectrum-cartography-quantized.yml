id: romero-2015-spectrum-cartography-quantized
title: "Spectrum Cartography Using Quantized Observations"
authors:
  - Daniel Romero
  - Seung-Jun Kim
  - Roberto Lopez-Valcarce
  - Georgios B. Giannakis
year: 2015
venue: "IEEE International Conference on Acoustics, Speech, and Signal Processing"
abstract: >
  Addresses the spectrum cartography problem when sensors report only quantized (one-bit
  or multi-bit) measurements rather than full-precision power readings. A maximum-likelihood
  estimator is derived under the quantized observation model, combined with a kernel-based
  nonparametric regression framework. The approach substantially reduces communication
  overhead between sensors and the fusion center while maintaining accurate PSD map
  reconstruction, with theoretical performance bounds provided.
tldr: >
  Spectrum cartography with quantized sensor reports: ML estimation under coarse
  measurements using kernel regression, trading communication bandwidth for map fidelity.
