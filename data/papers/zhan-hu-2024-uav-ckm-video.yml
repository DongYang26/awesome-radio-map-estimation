abstract: >
  This paper studies QoE maximization for aerial video streaming over 3D urban cellular
  networks using an environment and channel knowledge map (ECKM) approach. Joint design
  of 3D UAV trajectory, transmission scheduling, and playback rate adaptation is tackled
  with two graph-model algorithms for the perfect-ECKM case. For the no-map case, a
  dueling Deep Q-learning solution with online map construction is proposed, demonstrating
  improved QoE over baselines.
tldr: >
  Leverages a 3D environment and channel knowledge map to jointly optimize UAV trajectory
  and video streaming quality in urban cellular networks.
