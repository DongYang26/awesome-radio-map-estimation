id: '2107.10574'
title: 'UAV-Aided Radio Map Construction Exploiting Environment Semantics'
authors:
  - Wenjie Liu
  - Junting Chen
year: 2023
venue: IEEE Transactions on Wireless Communications
subfield: REM
method_family: model-based
