input_modality: both
environment: outdoor
dimensionality: 3D
supervision: supervised
abstract: >
  This paper constructs a full 6D radio map predicting the channel gain between
  any transmitter and receiver location based on RSS measurements between
  low-altitude UAV nodes and ground nodes. A multi-class 3D virtual obstacle
  map with radio semantics is estimated jointly with propagation parameters via
  a least-squares formulation with partial quasiconvexity. The proposed
  algorithm substantially reduces the amount of measurement required while
  achieving the same radio map accuracy compared with interpolation approaches.
  In a UAV-aided relay scenario, the radio map-assisted placement achieves over
  50% capacity gain.
tldr: >
  Constructs a 6D channel-gain radio map by jointly estimating a 3D semantic
  obstacle map and propagation parameters from UAV RSS measurements, sharply
  reducing required samples.
