abstract: >
  This paper develops a full Bayesian formulation for radio map estimation (RME)
  that targets the posterior distribution of the map given measurements, going
  beyond point-estimate approaches. The posterior enables MMSE estimation of
  arbitrary map functionals such as coverage area, capacity, and bit error rate,
  while training only for power estimation. A conditional diffusion model
  implements the Bayesian estimator. Analytical and numerical comparisons
  establish when the Bayesian approach is preferable to non-Bayesian alternatives.
tldr: >
  Full posterior-distribution RME via conditional diffusion models; enables
  uncertainty quantification and MMSE estimation of any map functional trained
  solely on power measurements.
