id: bazerque-giannakis-2010-group-lasso
title: "Group-Lasso on Splines for Spectrum Cartography"
authors:
  - Juan Andres Bazerque
  - Gonzalo Mateos
  - Georgios B. Giannakis
year: 2010
venue: "IEEE Transactions on Signal Processing"
abstract: >
  Develops a spline-based approach to field estimation using a basis expansion model
  weighted by generic functions estimated from noisy samples. A regularized variational
  least-squares criterion yields finite-dimensional estimates spanned by thin-plate splines,
  with a group-Lasso sparsifying regularizer that selects a parsimonious set of bases.
  A distributed algorithm is derived for wireless sensor networks, and the method is
  applied to spectrum cartography where cognitive radios collaboratively estimate the
  spatial distribution of RF power spectral density across frequency bands.
tldr: >
  Landmark sparse-regression spectrum cartography via group-Lasso on spline bases,
  enabling distributed PSD atlas construction from collaborative cognitive radio measurements.
