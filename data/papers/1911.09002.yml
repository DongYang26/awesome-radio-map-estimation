id: "1911.09002"
title: "RadioUNet: Fast Radio Map Estimation With Convolutional Neural Networks"
authors:
  - Ron Levie
  - Çağkan Yapar
  - Gitta Kutyniok
  - Giuseppe Caire
year: 2019
venue: "IEEE Transactions on Wireless Communications"
abstract: >
  RadioUNet proposes a deep learning method based on a U-Net architecture to
  estimate the radio propagation pathloss map from transmitter location and an
  urban building map. The network learns to predict the pathloss function for all
  transmitter-receiver pairs in a given environment, achieving accuracy close to
  ray-tracing simulations at orders-of-magnitude lower inference cost. The paper
  also introduces methods for transferring simulation-trained models to real-world
  deployments.
tldr: "U-Net CNN estimates urban pathloss maps from building maps with ray-tracing accuracy at real-time speed, establishing a widely-used DL baseline for REM."
