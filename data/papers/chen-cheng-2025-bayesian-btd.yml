id: chen-cheng-2025-bayesian-btd
title: "Sensing Radio Maps via Bayesian Tensor Learning"
authors:
  - Zhongtao Chen
  - Lei Cheng
  - Yik-Chung Wu
year: 2025
venue: "IEEE International Conference on Communications (ICC)"
abstract: >
  Frames spatial-spectral radio map estimation as a Bayesian block-term tensor
  decomposition (BTD) problem where both the tensor rank and block-term ranks
  (encoding emitter count and properties) are unknown. Sparsity-promoting priors
  on factor matrices enable automatic rank learning without parameter tuning,
  overcoming the overfitting/underfitting problem of optimization-based BTD.
  Extensive numerical experiments confirm the effectiveness of the Bayesian BTD
  approach for joint RME and emitter-level disaggregation.
tldr: >
  Bayesian BTD for radio map estimation that automatically learns tensor and
  block-term ranks via sparsity priors, removing the need for rank hyperparameters.
