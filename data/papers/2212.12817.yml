id: "2212.12817"
title: "RME-GAN: A Learning Framework for Radio Map Estimation Based on Conditional Generative Adversarial Network"
authors:
  - Songyang Zhang
  - Achintha Wijesinghe
  - Zhi Ding
year: 2022
venue: "IEEE Internet of Things Journal"
abstract: >
  RME-GAN presents a two-phase learning framework for outdoor radio map estimation
  from sparse measurements. The first phase extracts global radio propagation
  patterns using a propagation model prior; the second phase trains a conditional
  GAN to estimate the local shadowing component. The framework is validated on
  outdoor cellular scenarios and significantly outperforms classical interpolation
  and prior deep learning methods in generating fine-resolution radio coverage maps.
tldr: "Two-phase cGAN framework combines propagation model priors with adversarial learning to reconstruct high-resolution outdoor radio maps from sparse samples."
