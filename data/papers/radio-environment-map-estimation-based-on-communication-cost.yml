year: 2017
venue: IEEE Vehicular Technology Conference
abstract: Radio environment maps can be a powerful tool for achieving efficient context-aware resource allocation in 5G heterogeneous networks. In this paper, we consider an heterogeneous network formed by a traditional cellular network and a wireless sensor network. The role of the wireless sensor network is to estimate the radio environment map of the cell using a geostatistical interpolation technique named Kriging. A distributed clustering algorithm was proposed in a previous work in order to decrease the complexity of the estimation. In our contribution, the clustering formation process is modified to include the communication cost as a metric to determine which nodes are included in each cluster. Simulation results show that the proposed algorithm improves the estimation quality for sparse wireless sensor networks, and preserves the network lifetime by forming clusters with an average of 5 nodes.
