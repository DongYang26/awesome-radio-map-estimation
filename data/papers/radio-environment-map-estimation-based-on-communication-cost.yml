id: radio-environment-map-estimation-based-on-communication-cost
title: Radio Environment Map Estimation Based on Communication Cost Modeling for Heterogeneous Networks
authors:
  - Fabiola Frantzis
  - Vinay-Prasad Chowdappa
  - C. Botella
