year: 2023
venue: IEEE Antennas and Wireless Propagation Letters
abstract: Propagation prediction is important in that it contributes toward optimal base station planning and placement. This is especially relevant for 5G and other future generations of cellular networks. In this work, we propose a machine learning-based method to rapidly predict path loss in an urban area using data extracted from online sources, such as OpenStreetMap and other geographical information systems to aid in cellular coverage estimation in an area. The outcome of this work is useful for an urban environment that sees rapid development and changes to its landscape. In such a scenario, the location of the existing base station will benefit from adjustment for optimal coverage provision.
