abstract: >
  This paper proposes environment-aware joint active/passive beamforming for
  RIS-aided wireless communication using CKM. User equipment location information
  is combined with radio environment information from CKM to achieve efficient
  beamforming without real-time channel training. Simulation results show superior
  performance over training-based beamforming, with robustness to UE location errors.
tldr: >
  CKM-enabled training-free joint active/passive beamforming for RIS-aided 6G systems
  by exploiting location-tagged channel knowledge instead of real-time pilot overhead.
