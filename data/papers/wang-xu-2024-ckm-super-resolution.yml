abstract: >
  This paper proposes an effective deep learning-based CKM construction method leveraging the
  image super-resolution network SRResNet, requiring no additional input beyond sparsely measured
  data. Beyond conventional path loss maps, the approach also constructs channel angle maps (CAMs)
  using the CKMImageNet dataset. Numerical results show it outperforms nearest-neighbor, bicubic
  interpolation, and SRGAN, achieving 1.4 dB RMSE in path loss with only 1/16 of locations measured.
tldr: "Adapts SRResNet image super-resolution to CKM upsampling, achieving 1.4 dB path-loss RMSE from 1/16 sparse measurements without extra inputs."
