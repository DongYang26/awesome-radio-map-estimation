abstract: >
  This work proposes a joint model- and data-driven approach to construct CKM by leveraging 3D
  point cloud environmental data and sparse location-tagged channel measurements. A novel point
  selector based on co-focal ellipsoids identifies point cloud subsets relevant to multipath
  gains via time-of-arrival analysis, and a neural channel gain estimator learns the mapping
  from selected subsets to channel gains. Experiments on a real-world dataset achieve 2.95 dB
  RMSE for PDP CKM, outperforming conventional ray-tracing.
tldr: "Constructs CKM from 3D LiDAR point clouds and sparse measurements using a ToA-guided neural estimator, surpassing ray-tracing on real data."
