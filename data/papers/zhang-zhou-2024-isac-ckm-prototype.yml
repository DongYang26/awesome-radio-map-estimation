abstract: >
  This paper presents an ISAC-based CKM prototype system on mmWave OFDM, demonstrating
  the mutualistic relationship between ISAC and CKM. The prototype showcases the full
  pipeline of CKM construction (storing UE channel feedback indexed by ISAC-estimated
  location) and CKM application (training-free mmWave beam alignment by CKM look-up).
  Experimental results confirm that ISAC constructs or updates CKM during communication
  while pre-learned CKM enables training-free beam alignment.
tldr: >
  First hardware prototype demonstrating the ISAC-CKM co-design loop: ISAC localizes
  the UE to build CKM, and CKM enables training-free mmWave beam alignment.
