id: k-nearest-neighbors-gaussian-process-regression-for-urban-ra
title: K-Nearest Neighbors Gaussian Process Regression for Urban Radio Map Reconstruction
authors:
  - Yifang Zhang
  - Shaowei Wang
year: 2022
venue: IEEE Communications Letters
abstract: Radio map is of great importance to interference control, network planning and resource allocation in wireless communications. In this letter, we develop an accurate radio map reconstruction method based on k-nearest neighbors Gaussian process regression, which can exploit the relationship of the received signal strengths at adjacent locations efficiently. Numerical experiments demonstrate that our proposed method outperforms the state-of-the-art ones significantly.
