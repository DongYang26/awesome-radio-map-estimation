id: "icassp2023-pathloss-challenge"
title: "The First Pathloss Radio Map Prediction Challenge"
authors:
  - Çagkan Yapar
  - Fabian Jaensch
  - Ron Levie
  - Gitta Kutyniok
  - Giuseppe Caire
year: 2023
venue: "IEEE International Conference on Acoustics, Speech, and Signal Processing (ICASSP)"
abstract: >
  This paper describes the ICASSP 2023 First Pathloss Radio Map Prediction Challenge,
  launched to foster research and facilitate fair comparisons among recently proposed
  deep learning methods for pathloss radio map prediction. The challenge provides
  standardized datasets, a well-defined task formulation, and a common evaluation
  methodology. The paper presents the challenge results, summarizing the diverse
  deep-learning approaches submitted by participants.
tldr: "Overview of the ICASSP 2023 competition that standardized benchmarking of DL-based pathloss map prediction and attracted diverse neural-architecture submissions."
