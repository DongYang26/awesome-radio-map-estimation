id: enhancing-path-loss-prediction-through-explainable-machine-l
title: Enhancing Path Loss Prediction Through Explainable Machine Learning Approach
authors:
  - Ibrahim Yazici
  - Emrecan Özkan
  - Emre Gures
year: 2024
venue: International Conference on Wireless Networks and Mobile Communications
abstract: Wireless communication systems heavily rely on accurate path loss prediction for effective radio frequency (RF) planning. In this paper, we propose a novel approach to path loss prediction by leveraging explainable machine learning techniques. Leveraging a public data set containing crucial environmental factors such as distance, longitude, latitude, elevation, altitude, and clutter height, we employ Extreme Gradient Boosting (XGBoost). Through rigorous cross-validation, we determine the optimal parameters for the XGBoost model. Subsequently, we apply explainable machine learning techniques, including SHAP (SHapley Additive exPlanations) and LIME (Local Interpretable Model-agnostic Explanations), to unlock the black box of machine learning method and gain deeper insights into the model's predictions. Some visualizations to enrich our understanding of the relationships between input features and path loss are presented. This study offers transparency and interpretability in path loss prediction by its findings, thereby enhancing the applicability of machine learning in RF planning.
