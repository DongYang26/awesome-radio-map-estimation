year: 2025
venue: IEEE Transactions on Vehicular Technology
abstract: This paper proposes a radio map reconstruction algorithm based on Deep Denoising Regularization (RMC-DDR) to effectively reconstruct high-precision radio maps under sparse data conditions and high environmental complexity. Traditional methods of obtaining radio maps face many challenges, especially when dealing with limited measurement data. This algorithm combines the deep learning framework with denoising regularization techniques, enabling the reconstruction of accurate radio maps from sparse data, significantly improving the precision and robustness of radio map reconstruction, and providing adequate technical support for optimizing unmanned aerial vehicle (UAV) communication systems. By enhancing the accuracy of radio map reconstructions, this algorithm improves UAV flight path planning and substantially boosts communication reliability and the speed of task execution. Experimental findings highlight the algorithm's pronounced superiority in the precision of radio map reconstruction, showcasing its broad application prospects in challenging environments.
