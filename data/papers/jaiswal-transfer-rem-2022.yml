id: jaiswal-transfer-rem-2022
title: 'Deep Transfer Learning Based Radio Map Estimation for Indoor Wireless Communications'
authors:
  - Rahul Kumar Jaiswal
  - Mohamed Elnourani
  - Siddharth Deshmukh
  - Baltasar Beferull-Lozano
year: 2022
venue: IEEE International Workshop on Signal Processing Advances in Wireless Communications (SPAWC)
subfield: REM
method_family: learning-based
