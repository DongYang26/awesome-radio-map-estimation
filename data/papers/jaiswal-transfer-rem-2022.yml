input_modality: sparse-measurements
environment: indoor
dimensionality: 2D
supervision: supervised
abstract: >
  This paper investigates transfer learning for indoor radio map estimation,
  enabling a deep neural network model trained in one environment to be adapted
  to new environments with much less data. A data-driven similarity measure
  predicts the amount of fine-tuning data needed in a target environment.
  Results show 60–70% savings in sensor measurement data while maintaining
  accuracy after transfer, making the approach practical for environments with
  different propagation characteristics.
tldr: >
  Transfer learning framework that adapts indoor REM models across environments
  with 60-70% fewer measurements by quantifying environment similarity.
