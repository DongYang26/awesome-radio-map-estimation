abstract: >
  This article proposes the concept of channel knowledge map (CKM) as an enabler
  toward environment-aware wireless communications. CKM is a site-specific database,
  tagged with transmitter/receiver locations, that contains channel-related information
  useful to enhance environment-awareness and facilitate or even obviate sophisticated
  real-time CSI acquisition. Four channel types are highlighted as especially appealing
  for CKM: channels for yet-to-reach locations, channels for non-cooperative nodes,
  channels with large dimensions, and channels with severe hardware/processing limitations.
tldr: >
  Foundational paper introducing the CKM concept as a location-tagged site-specific
  channel database enabling environment-aware 6G communications without real-time CSI training.
