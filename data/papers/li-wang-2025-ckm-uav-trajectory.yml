abstract: >
  This work proposes a site-specific differentiable CKM constructed as a back-propagation
  neural network (BPNN) to enable joint UAV trajectory and transmit power optimization.
  Transfer learning allows CKM migration to nearby base stations with significantly fewer
  training samples. Multi-UAV trajectory and power control are optimized via continuous
  convex approximation using the differentiable CKM, achieving improved minimum average
  rate over distance-based path-loss models and fixed-power CKM baselines.
tldr: >
  Differentiable BPNN-based CKM with transfer learning enables joint UAV trajectory
  and power optimization in cellular-connected multi-UAV systems.
