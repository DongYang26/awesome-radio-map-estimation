abstract: >
  This paper proposes an Enhanced-CKM that integrates a beam probability map with the conventional
  beam index map to better capture the relationship between UE location and optimal beamforming
  direction for mmWave systems. A multi-feature fusion deep learning model fuses Enhanced-CKM inputs
  to predict per-beam probability of being optimal. An adaptive beam recommendation strategy then
  selects a variable-size beam subspace until a probability threshold is exceeded, achieving better
  accuracy-versus-overhead tradeoffs than existing methods.
tldr: "Enhanced-CKM augments path-loss maps with beam probability distributions, enabling adaptive mmWave beam recommendation with fewer sweeps."
