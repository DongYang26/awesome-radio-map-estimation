abstract: >
  Presents the conference version of LocUNet, a fast convolutional neural network for
  outdoor urban positioning that leverages estimated pathloss radio maps together with
  received signal strength measurements from a small number of base stations. The method
  achieves state-of-the-art localisation accuracy and real-time performance, demonstrating
  that accurate pathloss map prediction is directly beneficial for downstream positioning
  tasks in dense urban environments.
tldr: "Conference paper introducing LocUNet for fast urban positioning via CNN-predicted pathloss radio maps and RSS measurements."
