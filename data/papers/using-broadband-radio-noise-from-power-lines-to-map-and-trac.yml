id: using-broadband-radio-noise-from-power-lines-to-map-and-trac
title: Using Broadband Radio Noise From Power‐Lines to Map and Track Dense Es Structures
authors:
  - K. Obenberger
  - J. Dowell
  - C. Fallen
  - J. Holmes
  - G. Taylor
  - S. Varghese
year: 2021
venue: Radio Science
abstract: We present passive observations of midlatitude sporadic E (Es) structures in the 30–50 MHz range using the long wavelength array telescopes in New Mexico. Spectral and temporal analysis of the structures reveals that some of the emissions can be characterized by broadband, spark‐like radiation occurring at a repetition frequency of 60 Hz. The azimuthal distribution indicates that the brightest emissions come from the directions of several large metropolitan centers with distances ranging from 700 to 1,250 km from the telescopes. This implies that the source is unintended human‐made noise, originating from devices connected to 60 Hz alternating current power. The geometry of our observations rule out coherent scatter from field‐aligned irregularities, and indicate that the unintended noise must undergo a specular reflection off of over‐dense plasma distributed approximately parallel to Earth's surface. On certain occasions the reflections are seen at such high frequencies and high elevation angles that the local plasma frequency must be above 30 MHz. During both day and night Es conditions, the dense structures are observed to be arranged in propagating fronts, and travel at speeds of 70–100 m/s. We also present observations that reveal quasi‐periodic amplitude oscillations with frequencies consistent with atmospheric gravity waves and acoustic waves.
