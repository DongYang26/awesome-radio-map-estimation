id: '2105.07768'
title: Self-Learning for Received Signal Strength Map Reconstruction with Neural Architecture Search
authors:
  - A. Malkova
  - Loïc Pauletto
  - C. Villien
  - B. Denis
  - Massih-Reza Amini
year: 2021
venue: International Conference on Artificial Neural Networks
abstract: In this paper, we present a Neural Network (NN) model based on Neural Architecture Search (NAS) and self-learning for received signal strength (RSS) map reconstruction out of sparse single-snapshot input measurements, in the case where data-augmentation by side deterministic simulations cannot be performed. The approach first finds an optimal NN architecture and simultaneously train the deduced model over some ground-truth measurements of a given (RSS) map. These ground-truth measurements along with the predictions of the model over a set of randomly chosen points are then used to train a second NN model having the same architecture. Experimental results show that signal predictions of this second model outperforms non-learning based interpolation stateof-the-art techniques and NN models with no architecture search on five large-scale maps of RSS measurements.
