abstract: >
  This paper presents a comprehensive CKM construction scheme based on a UAV-assisted channel
  measurement system for real-world scenarios. A 3D CKM construction pipeline covers channel
  knowledge extraction using sliding correlation and CFAR, followed by 3D Kriging interpolation
  for completion. A UAV-assisted measurement system was deployed and measurement campaigns conducted
  in campus and farmland scenarios, producing path loss and RMS delay spread CKMs at different
  heights, demonstrating effective and accurate construction in real-world environments.
tldr: "Builds 3D path-loss and delay-spread CKMs via UAV measurements in campus and farmland, completed with 3D Kriging interpolation."
