id: rem-gp-location-2015
title: "Location Estimation-Based Radio Environment Map Construction in Fading Channels"
authors:
  - Huseyin Birkan Yilmaz
  - Tuna Tugcu
year: 2015
venue: "Wireless Communications and Mobile Computing"
abstract: >
  This paper addresses REM construction under uncertain measurement positions by
  jointly estimating sensor locations and signal field values using a Gaussian
  process regression framework. The method accounts for fading channel statistics
  when interpolating received signal strength, providing a principled probabilistic
  approach to handle location uncertainty inherent in mobile crowdsourcing
  scenarios. Simulations confirm robust REM accuracy even under significant
  positioning errors.
tldr: "Gaussian process framework jointly estimates sensor positions and signal field values for robust REM construction under location uncertainty in fading channels."
