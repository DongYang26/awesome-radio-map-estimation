id: '2201.04125'
title: 'Spectrum Surveying: Active Radio Map Estimation With Autonomous UAVs'
authors:
  - Raj K. Shrestha
  - Daniel Romero
  - Sundeep Chepuri
year: 2022
venue: IEEE Transactions on Wireless Communications
subfield: REM
