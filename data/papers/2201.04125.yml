environment: outdoor
dimensionality: 2D
supervision: supervised
abstract: >
  This paper proposes spectrum surveying, where a UAV collects measurements at
  actively selected locations to obtain high-quality radio map estimates in
  minimal surveying time. A model-based online Bayesian estimator and a
  data-driven deep learning algorithm are devised for updating map estimates
  and an uncertainty metric indicating measurement informativeness. A dynamic
  programming approach plans the UAV trajectory to gather measurements at the
  most informative locations in linear time. Experiments on realistic datasets
  confirm that the scheme constructs accurate radio maps quickly.
tldr: >
  UAV-based active radio map estimation that jointly learns uncertainty and
  plans measurement trajectories for efficient spectrum surveying.
