id: tao-tan-2026-laker-attention-kernel
title: "Accelerating Regularized Attention Kernel Regression for Spectrum Cartography"
authors:
  - Liping Tao
  - Chee Wei Tan
year: 2026
venue: "arXiv preprint"  # TODO: maintainer verify — no confirmed venue yet
abstract: >
  Addresses the computational bottleneck of attention-kernel-based spectrum
  cartography, where exponential kernels produce severe spectral imbalance and
  large condition numbers that stall standard iterative solvers. Proposes LAKER
  (Learning-based Attention Kernel Regression), which learns a data-dependent
  preconditioner via shrinkage-regularized convex-concave estimation to reduce
  condition numbers. Integrated with preconditioned conjugate gradient, LAKER
  reduces condition numbers by up to three orders of magnitude and accelerates
  convergence by over twenty-fold while maintaining reconstruction accuracy.
tldr: >
  LAKER learns a data-dependent preconditioner for attention-kernel spectrum
  cartography, cutting condition numbers 1000x and convergence time 20x.
