abstract: >
  This paper designs three physics-based constraints characterizing the spatial distribution of
  large-scale fading and integrates them into a state-of-the-art diffusion model to construct
  CKM without relying on prior channel observations. The physics-inspired diffusion model derives
  a loss function augmented with constraint terms, enabling generation of diverse, physically
  consistent CKMs. Extensive experiments show the approach outperforms all existing methods in
  construction accuracy.
tldr: "Embeds three physics constraints into a diffusion generative model to construct physically consistent CKMs without any prior channel observations."
