input_modality: environment-map
environment: outdoor
dimensionality: 3D
supervision: supervised
abstract: >
  Presents DRaGon (Deep RAdio channel modeling from GeOinformatioN), a machine learning
  method for automatic generation of Radio Environmental Maps from geographical data.
  DRaGon combines 3D propagation environment features with raw receiver-area images in a
  deep learning model. Validated against real-world measurements, ray tracing, and known
  channel models, DRaGon achieves significantly higher prediction accuracy than reference
  methods by fusing domain expert features with data-driven learning.
tldr: "DRaGon fuses 3D geo-features and raw images in a CNN to automatically generate radio environment maps with higher accuracy than ray tracing or statistical models."
