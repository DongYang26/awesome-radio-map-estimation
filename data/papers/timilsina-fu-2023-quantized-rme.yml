id: timilsina-fu-2023-quantized-rme
title: "Quantized Radio Map Estimation Using Tensor and Deep Generative Models"
authors:
  - Subash Timilsina
  - Sagar Shrestha
  - Xiao Fu
year: 2023
venue: "IEEE Transactions on Signal Processing"
abstract: >
  Extends provable spectrum cartography to the realistic setting where sensors
  transmit heavily quantized measurements rather than full-resolution real values.
  A maximum likelihood estimation framework under a Gaussian quantizer is proposed
  for both block-term tensor decomposition (BTD) and deep generative model (DGM)
  based recovery. Recoverability is characterized under imperfect modeling and noisy
  conditions; simulations and real-data experiments demonstrate effectiveness.
tldr: >
  MLE-based spectrum cartography with provable guarantees when sensors send
  quantized (1-bit to low-bit) measurements, unifying BTD and deep generative models.
