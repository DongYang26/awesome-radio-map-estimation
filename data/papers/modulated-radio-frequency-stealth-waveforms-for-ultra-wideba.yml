id: modulated-radio-frequency-stealth-waveforms-for-ultra-wideba
title: Modulated Radio Frequency Stealth Waveforms for Ultra-Wideband Radio Fuzes
authors:
  - Kaiwei Wu
  - Bing Yang
  - Shijun Hao
  - Yanbin Liang
  - Zhonghua Huang
year: 2024
venue: Entropy
abstract: The increasingly complex electromagnetic environment of modern warfare and the proliferation of intelligent jamming threaten to reduce the survival rate of radio fuzes on the battlefield. Radio frequency (RF) stealth technology can fundamentally improve the anti-interception and reconnaissance capabilities of radio fuzes, thereby lessening the probability of them being intercepted, recognized, and jammed by the enemy. In this paper, an RF stealth waveform based on chaotic pulse-position modulation is proposed for ultra-wideband (UWB) radio fuzes. Adding a perturbation signal based on the Tent map ensures that the chaotic sequences have sufficiently long periods despite hardware byte limitations. Measuring the approximate entropy and sequence period shows that the Tent map with the addition of perturbation signals can maintain good randomness under byte constraints, closely approximating the Tent map with ideal precision. Simulations verify that the proposed chaotic mapping used to modulate the pulse position of an ultra-wideband radio fuze signal results in superior detection, anti-interception, and anti-jamming performance.
