id: accurate-energy-efficiency-prediction-in-sub-6ghz-radio-acce
title: Accurate Energy Efficiency Prediction in Sub-6GHz Radio Access Networks Based on Pathloss Modeling Using Kriging Methods
authors:
  - Hao-Jen Fu
  - Timothy O'Farrell
year: 2023
venue: 2023 IEEE International Conference on Communications Workshops (ICC Workshops)
abstract: Radio access network (RAN) designers need to prioritize capacity and energy efficiency performance in 5G RANs to accommodate the increasing user demands. The analysis of RAN performances is substantially simplified through the application of an accurate, low computational complexity, and straightforward-to-apply pathloss model, which incorporates realistic correlated shadow fading. The work presented in this paper is based on the kriging method that generates an accurate correlated shadow fading map, which can be derived from either measured or simulated pathloss data. The new model is found to accurately predict throughput and energy efficiency in a densified urban RAN when compared with a reference data set.
