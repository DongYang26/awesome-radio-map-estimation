abstract: >
  This comprehensive tutorial covers environment-aware communications enabled by CKM
  for 6G networks. It presents the basic CKM concept, compares CKM with existing
  channel inference techniques, and discusses construction methods including both
  environment model-free and model-assisted approaches. A general utilization framework
  is presented for CKM-aided communication scenarios, with open problems and future
  directions highlighted.
tldr: >
  Comprehensive survey and tutorial on CKM covering construction methods, utilization
  frameworks, and CKM-aided 6G communication scenarios from the leading research group.
