abstract: >
  This paper introduces a CKM-assisted dual-domain tracking and predictive beamforming scheme for
  high-mobility wireless networks. In the coordinate domain, an extended Kalman filter predicts and
  tracks receiver state under LoS-present and LoS-absent conditions using CKM-derived multipath-to-location
  priors. In the beam domain, updated location feeds back to CKM for a priori AoA variation information,
  enabling beam transition models for effective beam tracking. A joint predictive beamforming and power
  allocation design minimizes AoA estimation errors to enhance multipath beam and target tracking.
tldr: "CKM-aided EKF and beam-domain tracking jointly handle mobility in both coordinate and beam domains, significantly improving NLoS beam and target tracking."
